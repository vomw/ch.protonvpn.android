name: Build and Sign Android APK

on:
  push:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  build:
    name: Build and Sign APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history required for versioning from git tags

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools"
          cmdline-tools-version: "latest"
          log-accepted-android-sdk-licenses: false

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Set Version Variable
        id: version
        run: |
          BUILD_DATE=$(date +'%Y%m%d-%H%M')
          VERSION_NAME="v${{ github.run_number }}-${BUILD_DATE}"
          # Base 600,000,000 + run number to stay in valid range
          VERSION_CODE=$((600000000 + ${{ github.run_number }}))
          echo "OVERRIDE_VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "OVERRIDE_VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Debug - Print Dependency Tree
        run: ./gradlew :app:dependencies --configuration productionVanillaDirectReleaseRuntimeClasspath -q > dependencies.txt

      - name: Upload Dependency Tree
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-tree
          path: dependencies.txt

      - name: Build Production Vanilla Direct Release APK
        run: ./gradlew :app:assembleProductionVanillaDirectRelease -q
        env:
          OVERRIDE_VERSION_NAME: ${{ steps.version.outputs.VERSION }}
          OVERRIDE_VERSION_CODE: ${{ env.OVERRIDE_VERSION_CODE }}

      - name: Run Unit Tests (Debug Measure)
        run: ./gradlew :app:testProductionVanillaDirectReleaseUnitTest -q --continue
        env:
          OVERRIDE_VERSION_NAME: ${{ steps.version.outputs.VERSION }}
          OVERRIDE_VERSION_CODE: ${{ env.OVERRIDE_VERSION_CODE }}

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/test-results/**/*.xml'

      - name: Upload Build Reports on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: '**/build/reports/'

      - name: Sign APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/productionVanillaDirect/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
          alias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "36.0.0" # Pass as environment variable to the action

      - name: Prepare Artifact Names
        id: names
        run: |
          # Extract versioning information using the Gradle task defined in the codebase
          # Use -q to suppress gradle lifecycle messages
          ./gradlew :app:getExportArchiveNameProperties -q > props.txt
          
          # The task prints: archivesBaseName, fullVersionName, versionCode
          VERSION_NAME=$(sed -n '2p' props.txt | tr -d '\r\n')
          
          # Package ID is ch.protonvpn.android
          PACKAGE_ID="ch.protonvpn.android"
          
          # Construct the filename as requested: {packageId}-v{version}.apk
          # Sanitize version name to remove any unexpected whitespace
          CLEAN_VERSION=$(echo "$VERSION_NAME" | xargs)
          NEW_NAME="${PACKAGE_ID}-${CLEAN_VERSION}.apk"
          
          # The signed APK is produced by the sign-android-release action
          # We use the output from the sign_app step for maximum reliability
          SIGNED_APK_PATH="${{ steps.sign_app.outputs.signedReleaseFile }}"
          
          if [ -f "$SIGNED_APK_PATH" ]; then
            cp "$SIGNED_APK_PATH" "./$NEW_NAME"
            echo "NEW_NAME=$NEW_NAME" >> $GITHUB_OUTPUT
            echo "Successfully prepared artifact: $NEW_NAME"
          else
            # Fallback check if the output variable is somehow empty
            FALLBACK_PATH=$(find app/build/outputs/apk/productionVanillaDirect/release -name "*-signed.apk" | head -n 1)
            if [ -f "$FALLBACK_PATH" ]; then
                cp "$FALLBACK_PATH" "./$NEW_NAME"
                echo "NEW_NAME=$NEW_NAME" >> $GITHUB_OUTPUT
                echo "Successfully prepared artifact from fallback: $NEW_NAME"
            else
                echo "Error: Signed APK not found"
                exit 1
            fi
          fi
        env:
          OVERRIDE_VERSION_NAME: ${{ steps.version.outputs.VERSION }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.names.outputs.NEW_NAME }}
          path: ${{ steps.names.outputs.NEW_NAME }}
          if-no-files-found: error
