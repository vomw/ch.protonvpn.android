name: Build and Sign Android APK

on:
  push:
    branches:
      - '*'
  workflow_dispatch:

jobs:
  build:
    name: Build and Sign APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history required for versioning from git tags

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools"
          cmdline-tools-version: "latest"
          log-accepted-android-sdk-licenses: false

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Set Version Variable
        id: version
        run: |
          BUILD_DATE=$(date +'%Y%m%d-%H%M')
          VERSION_NAME="v${{ github.run_number }}-${BUILD_DATE}"
          VERSION_CODE=$((600000000 + ${{ github.run_number }}))
          echo "OVERRIDE_VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "OVERRIDE_VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Debug - Verify Stubs
        run: |
          echo "Verifying local stubs existence..."
          ls -R app/src/main/java/io/sentry/ || echo "Sentry stubs missing!"
          ls -R app/src/main/java/me/proton/core/observability/ || echo "Observability stubs missing!"

      - name: Build Production Vanilla Direct Release APK
        id: build_apk
        run: |
          ./gradlew :app:assembleProductionVanillaDirectRelease --no-daemon -q --stacktrace --info > build-output.log 2> build-error.log
        env:
          OVERRIDE_VERSION_NAME: ${{ steps.version.outputs.VERSION }}
          OVERRIDE_VERSION_CODE: ${{ env.OVERRIDE_VERSION_CODE }}
        continue-on-error: true

      - name: Run Unit Tests (Debug Measure)
        id: run_tests
        run: |
          ./gradlew :app:testProductionVanillaDirectReleaseUnitTest --no-daemon -q --continue --stacktrace --info > test-output.log 2> test-error.log
        env:
          OVERRIDE_VERSION_NAME: ${{ steps.version.outputs.VERSION }}
          OVERRIDE_VERSION_CODE: ${{ env.OVERRIDE_VERSION_CODE }}
        continue-on-error: true

      - name: Extract Key Errors & Summary
        if: always()
        run: |
          mkdir -p debug-messages
          # Extract Kotlin/Java compilation errors
          grep -h "e: " build-output.log build-error.log test-output.log test-error.log > debug-messages/compilation-errors.txt || true
          # Extract R8 errors
          grep -h "R8:" build-output.log build-error.log >> debug-messages/r8-errors.txt || true
          # Extract Dagger/Hilt errors
          grep -h "Dagger/" build-output.log build-error.log test-output.log test-error.log > debug-messages/hilt-errors.txt || true
          # Extract Duplicate class errors
          grep -h "Duplicate class" build-output.log build-error.log > debug-messages/duplicate-classes.txt || true
          # Capture end of logs
          tail -n 500 build-output.log > debug-messages/build-output-tail.txt || true
          tail -n 500 test-output.log > debug-messages/test-output-tail.txt || true
          # Copy stubs for verification
          cp -r app/src/main/java/io/sentry debug-messages/sentry-stubs || true
          cp -r app/src/main/java/me/proton/core/observability debug-messages/observability-stubs || true
          
          # Print summary to GitHub Actions job summary
          echo "### Build Error Summary" >> $GITHUB_STEP_SUMMARY
          if [ -s debug-messages/compilation-errors.txt ]; then
            echo "#### Compilation Errors (First 10):" >> $GITHUB_STEP_SUMMARY
            head -n 10 debug-messages/compilation-errors.txt >> $GITHUB_STEP_SUMMARY
          fi
          if [ -s debug-messages/hilt-errors.txt ]; then
            echo "#### Hilt/Dagger Errors (First 10):" >> $GITHUB_STEP_SUMMARY
            head -n 10 debug-messages/hilt-errors.txt >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Debug Messages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-messages
          path: debug-messages/

      - name: Upload Full Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-logs
          path: |
            build-output.log
            build-error.log
            test-output.log
            test-error.log
            dependencies.txt
            dependencies-error.txt
            **/build/reports/
            **/build/test-results/**/*.xml

      - name: Fail if Build Failed
        run: |
          if [ "${{ steps.build_apk.outcome }}" != "success" ]; then
            echo "Build failed. Check debug-messages and full-logs."
            exit 1
          fi

      - name: Sign APK
        if: steps.build_apk.outcome == 'success'
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/productionVanillaDirect/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
          alias: ${{ secrets.SIGNING_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.SIGNING_STORE_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "36.0.0"

      - name: Prepare Artifact Names
        if: steps.sign_app.outcome == 'success'
        id: names
        run: |
          ./gradlew :app:getExportArchiveNameProperties -q > props.txt
          VERSION_NAME=$(sed -n '2p' props.txt | tr -d '\r\n')
          PACKAGE_ID="ch.protonvpn.android"
          CLEAN_VERSION=$(echo "$VERSION_NAME" | xargs)
          NEW_NAME="${PACKAGE_ID}-${CLEAN_VERSION}.apk"
          SIGNED_APK_PATH="${{ steps.sign_app.outputs.signedReleaseFile }}"
          if [ -f "$SIGNED_APK_PATH" ]; then
            cp "$SIGNED_APK_PATH" "./$NEW_NAME"
            echo "NEW_NAME=$NEW_NAME" >> $GITHUB_OUTPUT
          else
            FALLBACK_PATH=$(find app/build/outputs/apk/productionVanillaDirect/release -name "*-signed.apk" | head -n 1)
            if [ -f "$FALLBACK_PATH" ]; then
                cp "$FALLBACK_PATH" "./$NEW_NAME"
                echo "NEW_NAME=$NEW_NAME" >> $GITHUB_OUTPUT
            else
                exit 1
            fi
          fi
        env:
          OVERRIDE_VERSION_NAME: ${{ steps.version.outputs.VERSION }}

      - name: Upload Artifact
        if: steps.names.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.names.outputs.NEW_NAME }}
          path: ${{ steps.names.outputs.NEW_NAME }}
          if-no-files-found: error
